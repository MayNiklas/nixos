{
  "labels": {
    "backend": "local",
    "platform": "linux/amd64"
  },
  "steps": [
    {
      "commands": [
        "attic login lounge-rocks https://cache.lounge.rocks $ATTIC_KEY --set-default"
      ],
      "environment": {
        "ATTIC_KEY": {
          "from_secret": "attic_key"
        }
      },
      "image": "bash",
      "name": "Setup Attic"
    },
    {
      "commands": [
        "nix-fast-build --no-nom --skip-cached --attic-cache lounge-rocks:nix-cache --flake \".#checks.x86_64-linux\""
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Build all outputs for this architecture"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.aida.config.system.build.toplevel' -o 'result-aida'"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Rebuild aida (diagnostic)",
      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-aida')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show aida info"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.daisy.config.system.build.toplevel' -o 'result-daisy'"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Rebuild daisy (diagnostic)",
      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-daisy')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show daisy info"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.deke.config.system.build.toplevel' -o 'result-deke'"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Rebuild deke (diagnostic)",
      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-deke')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show deke info"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.kora.config.system.build.toplevel' -o 'result-kora'"
      ],
      "failure": "ignore",
      "image": "bash",
