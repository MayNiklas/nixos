    {
      "commands": [
        "test -e 'result-aida'",
        "test -e 'result-daisy'",
        "test -e 'result-deke'",
        "test -e 'result-kora'",
        "test -e 'result-simmons'",
        "test -e 'result-snowflake'",
        "test -e 'result-the-bus'",
        "test -e 'result-the-hub'",
        "echo 'All builds succeeded.'"
      ],
      "image": "bash",
      "name": "Verify all builds succeeded",
      "when": {
        "status": "failure"
      }
    }
  ],
  "when": [
    {
      "event": "manual"
    },
    {
      "branch": "main",
      "event": "push"
    },
    {
      "branch": "update_flake_lock_action",
      "event": "push"
    }
  ]
