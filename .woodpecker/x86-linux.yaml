      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-simmons')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show simmons info"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.snowflake.config.system.build.toplevel' -o 'result-snowflake'"
