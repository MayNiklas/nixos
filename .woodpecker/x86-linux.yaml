      "when": {
        "status": "failure"
      }
    },
    {
      "commands": [
        "nix path-info --closure-size -h $(readlink -f 'result-kora')"
      ],
      "failure": "ignore",
      "image": "bash",
      "name": "Show kora info"
    },
    {
      "commands": [
        "nix build --print-out-paths '.#nixosConfigurations.simmons.config.system.build.toplevel' -o 'result-simmons'"
      ],
      "failure": "ignore",
      "image": "bash",
